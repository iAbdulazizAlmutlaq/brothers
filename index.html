<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --ink:#0C201D;
    --ink-deep:#071613;
    --surface:rgba(239,230,206,0.05);
    --surface-strong:rgba(239,230,206,0.09);
    --border:rgba(239,230,206,0.11);
    --border-strong:rgba(240,195,109,0.35);
    --honey:#D79A2C;
    --honey-light:#F0C36D;
    --berry:#B0546A;
    --emerald:#3FBF95;
    --emerald-light:#7EDCBB;
    --paper-text:#F6F0DD;
    --muted:rgba(246,240,221,0.58);
    --muted-2:rgba(246,240,221,0.34);
    --radius:20px;
    --radius-sm:13px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--paper-text);
    font-family:'IBM Plex Sans Arabic','Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
  }

  /* ---------- atmospheric background ---------- */
  .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
  .blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:0.55;}
  .blob-a{width:520px;height:520px;background:radial-gradient(circle, rgba(215,154,44,0.5), transparent 70%);top:-160px;left:-120px;animation:driftA 26s ease-in-out infinite;}
  .blob-b{width:480px;height:480px;background:radial-gradient(circle, rgba(63,191,149,0.32), transparent 70%);bottom:-180px;right:-140px;animation:driftB 32s ease-in-out infinite;}
  .blob-c{width:380px;height:380px;background:radial-gradient(circle, rgba(176,84,106,0.32), transparent 70%);top:35%;right:8%;animation:driftC 22s ease-in-out infinite;}
  @keyframes driftA{0%,100%{transform:translate(0,0);}50%{transform:translate(60px,40px);}}
  @keyframes driftB{0%,100%{transform:translate(0,0);}50%{transform:translate(-50px,-30px);}}
  @keyframes driftC{0%,100%{transform:translate(0,0);}50%{transform:translate(-40px,50px);}}
  .moon-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:640px;height:640px;opacity:0.5;}
  .stars{position:absolute;inset:0;}
  .star{position:absolute;border-radius:50%;background:var(--honey-light);opacity:0.5;animation:twinkle 4s ease-in-out infinite;}
  @keyframes twinkle{0%,100%{opacity:0.15;}50%{opacity:0.8;}}
  @media(prefers-reduced-motion:reduce){
    .blob,.star,.fab{animation:none !important;}
    *{transition-duration:0.01ms !important;}
  }

  .wrap{max-width:640px;margin:0 auto;padding:26px 20px 100px;position:relative;z-index:1;}

  /* ---------- header / legend ---------- */
  header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:26px;flex-wrap:wrap;}
  .head-right{display:flex;align-items:center;gap:10px;}
  /* day-of-challenge chip — small, warm, minimal */
  .daychip{display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg, rgba(215,154,44,0.16), rgba(215,154,44,0.05));border:1px solid var(--border-strong);border-radius:999px;padding:6px 14px 6px 12px;}
  .daychip .dc-rocket{color:var(--honey-light);font-size:13px;line-height:1;}
  .daychip .dc-label{font-size:11px;color:var(--muted);}
  .daychip .dc-num{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:700;font-size:15px;color:var(--honey-light);line-height:1;}
  .meta{text-align:left;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:11px;color:var(--muted-2);line-height:1.5;}
  .meta .hijri{color:var(--honey-light);}
  .sync-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted-2);margin-left:5px;vertical-align:1px;}
  .sync-ok .sync-dot{background:var(--emerald);}
  .sync-error .sync-dot{background:var(--berry);}

  /* ---------- settings / edit mode ---------- */
  .gear-btn{background:none;border:1px solid rgba(239,230,206,0.16);color:var(--muted);width:28px;height:28px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:none;transition:all .18s ease;}
  .gear-btn svg{width:14px;height:14px;}
  .gear-btn:hover{border-color:var(--honey-light);color:var(--honey-light);}
  .gear-btn.active{background:var(--honey);border-color:var(--honey-light);color:var(--ink-deep);}
  .gear-btn:focus-visible{outline:2px solid var(--honey-light);outline-offset:2px;}
  .edit-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(215,154,44,0.12);border:1px solid var(--border-strong);border-radius:var(--radius-sm);padding:9px 13px;margin-bottom:14px;font-size:11.5px;color:var(--honey-light);}
  .edit-banner button{background:none;border:1px solid rgba(240,195,109,0.4);color:var(--honey-light);border-radius:999px;padding:4px 11px;font-size:11px;cursor:pointer;font-family:'IBM Plex Sans Arabic','Inter',sans-serif;}
  .edit-icons{display:flex;gap:2px;flex:none;}
  .edit-icon{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:14px;padding:3px 5px;border-radius:6px;}
  .edit-icon:hover{color:var(--honey-light);background:rgba(239,230,206,0.06);}
  .edit-icon.danger:hover{color:var(--berry);}

  .passcode-modal .modal{max-width:300px;text-align:center;}
  .passcode-modal input{width:100%;text-align:center;letter-spacing:3px;background:rgba(10,33,29,0.6);border:1px solid rgba(239,230,206,0.18);color:var(--paper-text);border-radius:9px;padding:10px;font-size:16px;font-family:'IBM Plex Sans Arabic','IBM Plex Mono',monospace;margin:14px 0 6px;}
  .passcode-modal .pc-error{font-size:11px;color:var(--berry);min-height:15px;margin-bottom:8px;}
  .passcode-modal .pc-note{font-size:10.5px;color:var(--muted-2);line-height:1.5;margin-top:10px;}

  .edit-form{display:none;width:100%;margin-top:8px;background:rgba(10,33,29,0.5);border:1px solid rgba(240,195,109,0.2);border-radius:10px;padding:10px;}
  .edit-form.show{display:block;}
  .edit-form input{width:100%;background:rgba(10,33,29,0.6);border:1px solid rgba(239,230,206,0.16);color:var(--paper-text);border-radius:7px;padding:7px 9px;font-size:12.5px;font-family:'IBM Plex Sans Arabic','Inter',sans-serif;margin-bottom:7px;}
  .edit-form .row2{display:grid;grid-template-columns:2.4fr 1fr;gap:7px;}

  /* ---------- celebrate ---------- */
  .celebrate{background:linear-gradient(135deg, rgba(215,154,44,0.16), rgba(176,84,106,0.1));border:1px solid var(--border-strong);border-radius:var(--radius);padding:22px;margin-bottom:22px;text-align:center;backdrop-filter:blur(10px);}
  .celebrate .ar{font-family:'Amiri',serif;font-size:20px;color:var(--honey-light);margin:0 0 6px;}
  .celebrate p.msg{font-size:12.5px;color:var(--muted);margin:0 0 14px;line-height:1.6;}
  .btn-primary{background:var(--honey);color:var(--ink-deep);border:none;border-radius:999px;padding:10px 20px;font-weight:700;font-size:12.5px;cursor:pointer;font-family:'IBM Plex Sans Arabic','Inter',sans-serif;}

  /* ---------- freq sections ---------- */
  .freq-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);backdrop-filter:blur(16px);overflow:hidden;margin-bottom:14px;}
  .sec-head{width:100%;background:none;border:none;color:inherit;cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;font-family:inherit;}
  .sec-head:focus-visible{outline:2px solid var(--honey-light);outline-offset:-2px;}
  .sec-title{font-family:'Amiri',serif;font-weight:700;font-size:15.5px;color:var(--paper-text);display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
  .sec-title .caret{font-size:11px;color:var(--muted-2);transition:transform .3s ease;}
  .freq-section.collapsed .sec-title .caret{transform:rotate(-90deg);}
  .sec-frac{font-family:'IBM Plex Sans Arabic','IBM Plex Mono',monospace;font-size:12px;color:var(--muted);flex:none;}

  .sec-body{display:grid;grid-template-rows:1fr;transition:grid-template-rows .32s ease;}
  .freq-section.collapsed .sec-body{grid-template-rows:0fr;}
  .sec-body-inner{overflow:hidden;padding:0 14px 14px;}

  .goal-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 6px;border-top:1px solid rgba(239,230,206,0.06);flex-wrap:wrap;}
  .goal-row:first-child{border-top:none;}
  .goal-left{display:flex;align-items:center;gap:10px;min-width:0;}
  .goal-emoji{font-size:17px;flex:none;}
  .goal-name{font-size:13.5px;color:var(--paper-text);font-weight:500;}
  .goal-name button.q{background:none;border:none;color:var(--muted-2);font-size:11px;cursor:pointer;margin-left:6px;padding:0;text-decoration:underline;text-underline-offset:2px;}
  .goal-badge{font-family:'IBM Plex Sans Arabic',sans-serif;font-size:10.5px;color:var(--muted);background:rgba(10,33,29,0.4);border:1px solid rgba(239,230,206,0.14);border-radius:999px;padding:3px 8px;margin-left:2px;}

  /* completed row: gentle honey tint + softened name (satisfying single-person checklist) */
  .goal-row.done{background:linear-gradient(90deg, rgba(215,154,44,0.08), transparent 70%);border-radius:12px;}
  .goal-row.done .goal-name{color:var(--muted);}

  .controls{display:flex;gap:6px;flex:none;}
  .pdot{width:24px;height:24px;border-radius:50%;border:2px solid rgba(240,195,109,0.5);background:none;cursor:pointer;padding:0;transition:all .18s ease;}
  .pdot.on{background:var(--honey);border-color:var(--honey-light);box-shadow:0 0 9px rgba(240,195,109,0.55);}
  .pdot:focus-visible{outline:2px solid var(--honey-light);outline-offset:2px;}

  /* weekly day-button: round, carries the weekday name, fills when done */
  .pday{min-width:40px;height:40px;padding:0 6px;border-radius:999px;border:2px solid rgba(240,195,109,0.5);background:rgba(10,33,29,0.4);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;font-size:11px;font-weight:600;color:var(--honey-light);transition:all .18s ease;display:inline-flex;align-items:center;justify-content:center;flex:none;}
  .pday.on{background:var(--honey);border-color:var(--honey-light);color:var(--ink-deep);box-shadow:0 0 10px rgba(240,195,109,0.55);}
  .pday:focus-visible{outline:2px solid var(--honey-light);outline-offset:2px;}

  .info-panel{display:none;font-size:11.5px;color:var(--muted);line-height:1.6;background:rgba(10,33,29,0.5);border-radius:10px;padding:11px 13px;margin:2px 0 8px;width:100%;}
  .info-panel.show{display:block;}
  .info-panel strong{color:var(--paper-text);}

  .sec-add-row{margin-top:4px;}
  .sec-add{background:none;border:1px dashed rgba(239,230,206,0.22);color:var(--muted);border-radius:10px;padding:7px 0;width:100%;font-size:11.5px;cursor:pointer;font-family:'IBM Plex Sans Arabic','Inter',sans-serif;transition:all .18s ease;}
  .sec-add:hover{border-color:var(--honey-light);color:var(--honey-light);}

  .mini-form{display:none;margin-top:8px;background:rgba(10,33,29,0.4);border-radius:10px;padding:10px;}
  .mini-form.show{display:block;}
  .mini-form input{width:100%;background:rgba(10,33,29,0.6);border:1px solid rgba(239,230,206,0.16);color:var(--paper-text);border-radius:7px;padding:7px 9px;font-size:12.5px;font-family:'IBM Plex Sans Arabic','Inter',sans-serif;margin-bottom:7px;}
  .mini-form .row2{display:grid;grid-template-columns:2fr 1fr;gap:7px;}
  .mini-form-actions{display:flex;gap:8px;margin-top:2px;}
  .btn-mini{flex:1;border-radius:8px;padding:7px 0;font-size:11.5px;cursor:pointer;font-family:'IBM Plex Sans Arabic','Inter',sans-serif;border:none;font-weight:600;}
  .btn-mini.save{background:var(--honey);color:var(--ink-deep);}
  .btn-mini.cancel{background:none;border:1px solid rgba(239,230,206,0.18);color:var(--muted);}
  .remove-x{background:none;border:none;color:var(--muted-2);cursor:pointer;font-size:15px;padding:2px 4px;flex:none;}
  .remove-x:hover{color:var(--berry);}

  footer{text-align:center;margin-top:36px;font-size:11.5px;color:var(--muted-2);position:relative;z-index:1;}
  footer .ar{font-family:'Amiri',serif;font-style:italic;color:var(--muted);font-size:14px;}
  ::selection{background:var(--honey);color:var(--ink-deep);}

  /* ---------- FAB ---------- */
  .fab{
    position:fixed;right:20px;bottom:20px;width:56px;height:56px;border-radius:50%;
    background:linear-gradient(145deg, var(--honey), #b97e1f);border:none;cursor:pointer;
    box-shadow:0 6px 20px rgba(215,154,44,0.45);
    display:flex;align-items:center;justify-content:center;z-index:20;
    animation:fabPulse 3.5s ease-in-out infinite;
  }
  .fab svg{width:24px;height:24px;}
  @keyframes fabPulse{0%,100%{box-shadow:0 6px 20px rgba(215,154,44,0.45);}50%{box-shadow:0 6px 28px rgba(215,154,44,0.75);}}
  .fab:focus-visible{outline:2px solid var(--paper-text);outline-offset:3px;}

  /* ---------- modal ---------- */
  .modal-backdrop{
    display:none;position:fixed;inset:0;background:rgba(4,12,10,0.72);backdrop-filter:blur(6px);
    z-index:30;align-items:center;justify-content:center;padding:20px;
  }
  .modal-backdrop.show{display:flex;}
  .modal{
    background:linear-gradient(180deg, #163732, #0F2B27);border:1px solid var(--border-strong);
    border-radius:var(--radius);padding:28px 24px 24px;max-width:440px;width:100%;
    position:relative;max-height:88vh;overflow-y:auto;
  }
  .modal-close{position:absolute;top:14px;right:14px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;padding:4px;}
  .modal-close:hover{color:var(--paper-text);}
  .modal-eyebrow{font-family:'IBM Plex Sans Arabic',sans-serif;font-size:13px;color:var(--honey-light);text-align:center;margin:0 0 20px;display:flex;align-items:baseline;justify-content:center;gap:8px;}
  .modal-eyebrow b{font-family:'IBM Plex Sans Arabic',sans-serif;font-size:34px;color:var(--paper-text);font-weight:700;line-height:1;}
  .modal-eyebrow .mday-of{font-size:14px;color:var(--muted-2);}
  /* wrapping bead grid — comfortably holds 45 beads across rows */
  .chain{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;align-items:center;padding:4px 2px;margin-bottom:14px;}
  .bead{position:relative;width:13px;height:13px;border-radius:50%;background:var(--ink-deep);border:2px solid rgba(239,230,206,0.28);opacity:0.5;transition:all .25s ease;}
  .bead.half{background:rgba(215,154,44,0.4);border-color:var(--honey);opacity:0.85;}
  .bead.full{background:var(--honey);border-color:var(--honey-light);opacity:1;box-shadow:0 0 10px rgba(240,195,109,0.55);}
  /* milestone days (15 / 30 / 45): distinct emerald ring, brighter when reached */
  .bead.milestone{border-color:var(--emerald);opacity:0.8;}
  .bead.milestone::before{content:"";position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(63,191,149,0.45);}
  .bead.milestone.full{background:var(--emerald);border-color:var(--emerald-light);box-shadow:0 0 12px rgba(63,191,149,0.7);}
  .bead.milestone.full::before{border-color:var(--emerald-light);}
  .bead.today{transform:scale(1.45);}
  .bead.today::after{content:"";position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(240,195,109,0.6);}
  .chain-caption{text-align:center;font-family:'IBM Plex Sans Arabic','IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin:2px 0 2px;}
  @media(max-width:480px){.chain{gap:8px;}.bead{width:11px;height:11px;}}

  /* form helpers for edit/add rows */
  .mini-label{font-size:11px;color:var(--muted);align-self:center;}
  .wd-select{width:100%;background:rgba(10,33,29,0.6);border:1px solid rgba(239,230,206,0.16);color:var(--paper-text);border-radius:7px;padding:7px 9px;font-size:12.5px;font-family:'IBM Plex Sans Arabic','Inter',sans-serif;}
  .mini-form .row2, .edit-form .row2{align-items:center;}

  /* celebratory popup */
  .cheer-modal{z-index:40;}
  .cheer-card{background:linear-gradient(180deg,#1B4038,#123029);border:1px solid var(--border-strong);border-radius:var(--radius);padding:26px 28px 22px;text-align:center;max-width:300px;width:100%;box-shadow:0 14px 44px rgba(0,0,0,0.4);animation:cheerPop .32s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes cheerPop{0%{transform:scale(.8);opacity:0;}100%{transform:scale(1);opacity:1;}}
  .cheer-spark{font-size:24px;color:var(--honey-light);margin-bottom:4px;}
  .cheer-msg{font-family:'IBM Plex Sans Arabic',sans-serif;font-weight:600;font-size:19px;line-height:1.5;color:var(--paper-text);margin:0 0 16px;}
  .cheer-btn{width:100%;}
</style>
</head>
<body>

<div class="bg-layer" aria-hidden="true">
  <div class="blob blob-a"></div>
  <div class="blob blob-b"></div>
  <div class="blob blob-c"></div>
  <svg class="moon-glow" viewBox="0 0 200 200"><defs><radialGradient id="mg" cx="50%" cy="35%" r="60%"><stop offset="0%" stop-color="#F0C36D" stop-opacity="0.28"/><stop offset="100%" stop-color="#F0C36D" stop-opacity="0"/></radialGradient></defs><circle cx="100" cy="70" r="100" fill="url(#mg)"/></svg>
  <div class="stars" id="starField"></div>
</div>

<div class="wrap">
  <header>
    <div class="daychip" id="dayChip" aria-label="يوم التحدي"></div>
    <div class="head-right">
      <div class="meta" id="metaBlock"></div>
      <button class="gear-btn" id="gearBtn" aria-label="تعديل الأهداف" title="تعديل الأهداف">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
        </svg>
      </button>
    </div>
  </header>

  <div id="editBannerSlot"></div>

  <div id="celebrateSlot"></div>

  <div id="sections"></div>

  <footer>
    <p class="ar">حلق يا عبوووود 🚀🚀</p>
  </footer>
</div>

<button class="fab" id="progressBtn" aria-label="عرض التقدّم" title="عرض التقدّم">
  <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 2 L14.2 6 L14.6 12.5 L13 15.5 L11 15.5 L9.4 12.5 L9.8 6 Z M9.6 12.2 L6.4 16.2 L9.2 15.4 Z M14.4 12.2 L17.6 16.2 L14.8 15.4 Z M10.6 15.6 L12 20.4 L13.4 15.6 Z" fill="#0C201D"/>
  </svg>
</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modalCard" role="dialog" aria-modal="true" aria-label="التقدّم">
    <button class="modal-close" id="modalClose" aria-label="إغلاق">&times;</button>
    <p class="modal-eyebrow"><b id="mDayNum">١</b><span class="mday-of">من <span id="mCycleLen">٤٥</span></span></p>
    <div class="chain" id="beadChain"></div>
    <p class="chain-caption" id="chainCaption"></p>
  </div>
</div>

<div class="modal-backdrop passcode-modal" id="passcodeBackdrop">
  <div class="modal" id="passcodeCard" role="dialog" aria-modal="true" aria-label="أدخل الرمز">
    <button class="modal-close" id="passcodeClose" aria-label="إغلاق">&times;</button>
    <p class="modal-eyebrow" style="margin-bottom:4px;">تعديل الأهداف</p>
    <p style="font-size:11.5px;color:var(--muted);margin:0;">أدخل الرمز لفتح وضع التعديل.</p>
    <input type="password" id="passcodeInput" inputmode="numeric" maxlength="12" placeholder="••••••••">
    <p class="pc-error" id="passcodeError"></p>
    <button class="btn-primary" id="passcodeSubmit" style="width:100%;">فتح</button>

/* Western → Eastern Arabic numerals, for a fully-Arabic display */
function ar(n){ return String(n).replace(/[0-9]/g, d=>'٠١٢٣٤٥٦٧٨٩'[d]); }
/* Eastern → Western, so a passcode typed on an Arabic keyboard still matches */
function toLatinDigits(s){ return String(s).replace(/[٠-٩]/g, d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d)); }
/* human-friendly Arabic "days away" label */
function daysLabel(n){
  if(n<=0) return 'اليوم';
  if(n===1) return 'غداً';
  if(n===2) return 'يومان';
  if(n<=10) return ar(n)+' أيام';
  return ar(n)+' يوماً';
}

/* Arabic ordinal word for a day count (اليوم الأول، الثاني، ... الخامس والأربعون).
   Covers 1-99, which is comfortably beyond any realistic cycle length. */
const ORDINAL_ONES = ['','الأول','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع'];
const ORDINAL_ONES_COMPOUND = ['','الحادي','الثاني','الثالث','الرابع','الخامس','السادس','السابع','الثامن','التاسع'];
const ORDINAL_TEENS = {10:'العاشر',11:'الحادي عشر',12:'الثاني عشر',13:'الثالث عشر',14:'الرابع عشر',15:'الخامس عشر',16:'السادس عشر',17:'السابع عشر',18:'الثامن عشر',19:'التاسع عشر'};
const ORDINAL_TENS = {20:'العشرين',30:'الثلاثين',40:'الأربعين',50:'الخمسين',60:'الستين',70:'السبعين',80:'الثمانين',90:'التسعين'};
function arabicOrdinalDay(n){
  if(n>=1 && n<=9) return ORDINAL_ONES[n];
  if(n>=10 && n<=19) return ORDINAL_TEENS[n];
  if(n%10===0 && ORDINAL_TENS[n]) return ORDINAL_TENS[n];
  if(n>=21 && n<=99){
    const tens=Math.floor(n/10)*10, ones=n%10;
    return ORDINAL_ONES_COMPOUND[ones]+' و'+ORDINAL_TENS[tens];
  }
  return ar(n);   // fallback for out-of-range values
}

/* ================= date / hijri helpers ================= */
function pad(n){return String(n).padStart(2,'0');}
function dateKey(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function todayDate(){const d=new Date();d.setHours(0,0,0,0);return d;}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function daysBetween(a,b){return Math.round((b-a)/86400000);}
function weekStart(d){const r=new Date(d);r.setDate(r.getDate()-r.getDay());return r;}

function gregorianToJDN(y,m,d){
  const a=Math.floor((14-m)/12);
  const y2=y+4800-a;
  const m2=m+12*a-3;
  return d+Math.floor((153*m2+2)/5)+365*y2+Math.floor(y2/4)-Math.floor(y2/100)+Math.floor(y2/400)-32045;
}
function islamicFromJDN(jdn){
  let l=jdn-1948440+10632+1;
  let n=Math.floor((l-1)/10631);
  l=l-10631*n+354;
  let j=(Math.floor((10985-l)/5316))*(Math.floor((50*l)/17719))+(Math.floor(l/5670))*(Math.floor((43*l)/15238));
  l=l-(Math.floor((30-j)/15))*(Math.floor((17719*j)/50))-(Math.floor(j/16))*(Math.floor((15238*j)/43))+29;
  const month=Math.floor((24*l)/709);
  const day=l-Math.floor((709*month)/24);
  const year=30*n+j-30;
  return {year,month,day};
}
function toHijri(d){return islamicFromJDN(gregorianToJDN(d.getFullYear(),d.getMonth()+1,d.getDate()));}
function findNextHijri17(fromDate, targetDay){
  const target = targetDay || 17;
  for(let i=0;i<45;i++){
    const d=addDays(fromDate,i);
    const h=toHijri(d);
    if(h.day===target) return {date:d,hijri:h};
  }
  return null;
}
function hijriPeriodKey(h){return h.year+'-'+h.month;}

/* ---- weekday helpers (weekly goals are tied to a specific weekday) ---- */
/* Next occurrence of a given weekday (0=Sun..6=Sat), searching from today's week.
   Returns {date, daysAway} where daysAway can be negative if it already passed
   earlier this week (still checkable for the current week). */
function nextWeekday(fromDate, dow){
  const ws=weekStart(fromDate);              // Sunday of this week
  const due=addDays(ws, dow);                // this week's occurrence
  return {date:due, daysAway:daysBetween(fromDate, due)};
}

/* ================= state ================= */
function defaultState(){
  const today=todayDate();
  return {
    habits:[
      {id:'honey', name:'عسل', emoji:'🍯', freq:'daily', builtin:true},
      {id:'blackseed', name:'الحبة السوداء', emoji:'🌿', freq:'daily', builtin:true},
      {id:'zamzam', name:'ماء زمزم', emoji:'💧', freq:'daily', builtin:true},
      {id:'costus', name:'القسط الهندي', emoji:'🪵', freq:'weekly', dayOfWeek:5, builtin:true},
      {id:'cupping', name:'الحجامة', emoji:'🔥', freq:'monthly-hijri', hijriDay:17, builtin:true}
    ],
    checkins:{},
    cycle:{start: dateKey(today), length:45},
    cyclesCompleted:0
  };
}
/* Bring older saved states up to the current single-person model:
   - weekly habits must carry a dayOfWeek (older ones used a numeric target)
   - check-ins are now a single boolean per period (drop the old {abdullah,abdulaziz}
     object and any legacy numeric counts, keeping Abdullah's value)
   - drop orphan check-ins whose habit no longer exists */
function normalizeState(s){
  s.habits = s.habits || [];
  s.habits.forEach(h=>{
    if(h.freq==='weekly' && (h.dayOfWeek===undefined || h.dayOfWeek===null)){
      h.dayOfWeek = 5;            // default to Friday
    }
    delete h.target;
    delete h.owner;
  });
  const ids = new Set(s.habits.map(h=>h.id));
  const src = s.checkins || {};
  const out = {};
  for(const hid in src){
    if(!ids.has(hid)) continue;                    // orphan → drop
    const periods = src[hid]; const kept = {};
    for(const pk in periods){
      let v = periods[pk];
      if(v && typeof v==='object') v = truthy(v.abdullah);   // old two-person shape
      else v = truthy(v);
      if(v) kept[pk] = true;                        // store only completions
    }
    if(Object.keys(kept).length) out[hid] = kept;
  }
  s.checkins = out;
  if(!s.cycle) s.cycle = {start: dateKey(todayDate()), length:45};
  if(!s.cycle.length) s.cycle.length = 45;
  return s;
}
function mergeWithDefaults(parsed){
  const d = defaultState();
  const merged = Object.assign(d, parsed, {habits: parsed.habits || d.habits, checkins: parsed.checkins || {}});
  return normalizeState(merged);
}

async function loadState(){
  try{
    const {data, error} = await sb.from('tracker_state').select('data').eq('id', ROW_ID).single();

      lastSavedJSON=JSON.stringify(fresh);
      await sb.from('tracker_state').upsert({id: ROW_ID, data: fresh, updated_at: new Date().toISOString()});
      setSyncStatus('ok');
      return fresh;
    }
    setSyncStatus('ok');
    const loaded=mergeWithDefaults(data.data);
    lastSavedJSON=JSON.stringify(loaded);
    return loaded;
  }catch(e){
    console.error('load error', e);
    setSyncStatus('error');
    return defaultState();
  }
}
let saveTimer=null;
let lastSavedJSON=null;      // remember what we last wrote, to ignore our own realtime echo
let savePending=false;
async function flushSave(){
  savePending=false;
  clearTimeout(saveTimer);
  try{
    const json=JSON.stringify(state);
    lastSavedJSON=json;
    const {error} = await sb.from('tracker_state').upsert({id: ROW_ID, data: state, updated_at: new Date().toISOString()});
    if(error) throw error;
    setSyncStatus('ok');
  }catch(e){
    console.error('save error', e);
    setSyncStatus('error');
    savePending=true;          // let a later flush retry
  }
}
function saveState(){

  savePending=true;

function setSyncStatus(s){

function subscribeRealtime(){

      if(payload.new && payload.new.data){
        const incoming=JSON.stringify(payload.new.data);
        if(incoming===lastSavedJSON) return;   // our own write echoing back — ignore
        state = mergeWithDefaults(payload.new.data);
        lastSavedJSON=JSON.stringify(state);
        render();
      }
    })
    .subscribe();
}

/* ================= checkin helpers (single person: one boolean per period) ===== */
function truthy(v){ return !!v && v!==0; }
function isDone(habitId, periodKey){
  return !!(state.checkins[habitId] && truthy(state.checkins[habitId][periodKey]));
}
function toggleDone(habitId, periodKey){
  if(!state.checkins[habitId]) state.checkins[habitId]={};
  const nowOn = !truthy(state.checkins[habitId][periodKey]);
  if(nowOn) state.checkins[habitId][periodKey]=true;
  else delete state.checkins[habitId][periodKey];   // keep the blob lean
  saveState(); render();
  if(nowOn) celebratePop();      // only cheer when checking ON, never on un-checking
}

/* ================= cycle / completion math ================= */
function dailyIds(){
  return state.habits.filter(h=>h.freq==='daily').map(h=>h.id);
}
function dayCompletion(dateStr){
  const ids=dailyIds();
  if(ids.length===0) return 0;
  let done=0;
  ids.forEach(id=>{ if(isDone(id, dateStr)) done++; });
  if(done===ids.length) return 2;
  if(done>0) return 1;
  return 0;
}
function cycleStatus(){
  const start=new Date(state.cycle.start);
  const today=todayDate();
  const length=state.cycle.length;
  const rawDay=daysBetween(start,today)+1;
  const dayNum=Math.min(Math.max(rawDay,1),length);
  const complete=rawDay>length;
  return {start, today, length, dayNum, complete};
}

/* ---- goal row rendering (single person → one control per row) ---- */
function controlHTML(h, periodKey, dayLabel){
  const on = isDone(h.id, periodKey);
  if(dayLabel){   // weekly: circular button carrying the weekday name
    return `<button class="pday${on?' on':''}" data-habit="${h.id}" data-period="${periodKey}" title="${h.name}" aria-label="${h.name} (${dayLabel})">${dayLabel}</button>`;
  }
  return `<button class="pdot${on?' on':''}" data-habit="${h.id}" data-period="${periodKey}" aria-label="${h.name}"></button>`;
}

function goalRowHTML(h){
  const today=dateKey(todayDate());
  const wk=dateKey(weekStart(todayDate()));

  if(h.freq==='daily'){
    return goalRowWrap(h, `
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}</span></div>
      <div class="controls">${controlHTML(h, today)}</div>
    `, isDone(h.id, today));
  }
  if(h.freq==='weekly'){
    const dow = (h.dayOfWeek===undefined||h.dayOfWeek===null) ? 5 : h.dayOfWeek;
    const nd = nextWeekday(todayDate(), dow);
    const badge = nd.daysAway>=0 ? daysLabel(nd.daysAway) : 'هذا الأسبوع';
    return goalRowWrap(h, `
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}</span>
        <span class="goal-badge">${badge}</span></div>
      <div class="controls">${controlHTML(h, wk, WEEKDAYS_SHORT[dow])}</div>
    `, isDone(h.id, wk));
  }
  if(h.freq==='monthly-hijri'){
    const next=findNextHijri17(todayDate(), h.hijriDay);
    if(!next) return '';
    const pkey=hijriPeriodKey(next.hijri);
    const daysAway=daysBetween(todayDate(), next.date);
    return goalRowWrap(h, `
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}</span>
        <span class="goal-badge">${daysLabel(daysAway)}</span></div>
      <div class="controls">${controlHTML(h, pkey)}</div>
    `, isDone(h.id, pkey));
  }
  if(h.freq==='monthly-day'){
    const today2=todayDate();
    const mkey=today2.getFullYear()+'-'+(today2.getMonth()+1);
    return goalRowWrap(h, `
      <div class="goal-left"><span class="goal-emoji">${h.emoji}</span><span class="goal-name">${h.name}</span>
        <span class="goal-badge">يوم ${ar(h.dayOfMonth)}</span></div>
      <div class="controls">${controlHTML(h, mkey)}</div>
    `, isDone(h.id, mkey));
  }
  return '';
}

  }else if(h.freq==='monthly-hijri'){

  }

      <input type="text" id="edit-name-${h.id}" placeholder="اسم الهدف" value="${h.name.replace(/"/g,'&quot;')}">
      <input type="text" id="edit-emoji-${h.id}" placeholder="🌱" value="${h.emoji}">
    </div>
    ${extraField}

      <button class="btn-mini cancel" data-edit-cancel="${h.id}">إلغاء</button>
    </div>
  </div>`;
}

/* ---- section fraction (today / this week / this month) ---- */
function sectionFraction(sec){
  const habits = state.habits.filter(sec.match);
  if(habits.length===0) return null;
  const today=dateKey(todayDate());
  const wk=dateKey(weekStart(todayDate()));
  const today2=todayDate();
  const mkey=today2.getFullYear()+'-'+(today2.getMonth()+1);
  let done=0, total=0;
  habits.forEach(h=>{
    total++;
    let pk=null;
    if(h.freq==='daily') pk=today;
    else if(h.freq==='weekly') pk=wk;
    else if(h.freq==='monthly-hijri'){ const next=findNextHijri17(todayDate(), h.hijriDay); pk=next?hijriPeriodKey(next.hijri):null; }
    else if(h.freq==='monthly-day') pk=mkey;
    if(pk && isDone(h.id, pk)) done++;
  });
  return {done, total};
}

              <div class="mini-form-actions">

            </div>

        </div>

    </section>`;
  }).join('');
  bindSectionEvents();
}

function bindSectionEvents(){
  document.querySelectorAll('[data-collapse]').forEach(btn=>{
    btn.onclick=()=>{
      const k=btn.dataset.collapse;
      collapsedSections[k]=!collapsedSections[k];
      renderSections();
    };
  });
  document.querySelectorAll('.pdot, .pday').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const {habit, period}=btn.dataset;
      toggleDone(habit, period);
    };
  });
  document.querySelectorAll('[data-remove]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      state.habits = state.habits.filter(h=>h.id!==btn.dataset.remove);
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-edit-open]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      openEditFormId = openEditFormId===btn.dataset.editOpen ? null : btn.dataset.editOpen;
      renderSections();
    };
  });
  document.querySelectorAll('[data-edit-cancel]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      openEditFormId=null;
      renderSections();
    };
  });
  document.querySelectorAll('[data-edit-save]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const id=btn.dataset.editSave;
      const h=state.habits.find(x=>x.id===id);
      if(!h) return;
      const nameEl=document.getElementById('edit-name-'+id);
      const emojiEl=document.getElementById('edit-emoji-'+id);
      const extraEl=document.getElementById('edit-extra-'+id);
      const name=nameEl.value.trim();
      if(!name) return;
      h.name=name;
      h.emoji=(emojiEl.value.trim())||h.emoji;
      if(extraEl){
        const val=Number(extraEl.value);
        if(h.freq==='weekly') h.dayOfWeek=Math.min(Math.max(val,0),6);
        else if(h.freq==='monthly-day') h.dayOfMonth=Math.min(Math.max(val||1,1),28);
        else if(h.freq==='monthly-hijri') h.hijriDay=Math.min(Math.max(val||1,1),30);
      }
      openEditFormId=null;
      saveState(); render();
    };
  });
  document.querySelectorAll('[data-add]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const k=btn.dataset.add;
      document.getElementById('form-'+k).classList.add('show');
      btn.style.display='none';
    };
  });
  document.querySelectorAll('[data-cancel]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const k=btn.dataset.cancel;
      document.getElementById('form-'+k).classList.remove('show');
      const addBtn=document.querySelector(`[data-add="${k}"]`);
      if(addBtn) addBtn.style.display='';
    };
  });
  document.querySelectorAll('[data-save]').forEach(btn=>{
    btn.onclick=(ev)=>{
      ev.stopPropagation();
      const k=btn.dataset.save;
      const name=document.getElementById('name-'+k).value.trim();
      if(!name) return;
      const extraInput = document.getElementById('extra-'+k);
      const extra = extraInput ? Number(extraInput.value) : 0;
      const habit={id:'g_'+Date.now(), name, emoji:'🌱', builtin:false};
      if(k==='daily') habit.freq='daily';
      else if(k==='weekly'){ habit.freq='weekly'; habit.dayOfWeek=Math.min(Math.max(extra,0),6); }
      else if(k==='monthly'){ habit.freq='monthly-day'; habit.dayOfMonth=Math.min(Math.max(extra||1,1),28); }
      state.habits.push(habit);
      saveState();
      render();
    };
  });
}

/* ================= modal / visual tracker ================= */
function openModal(){
  modalOpen = true;
  document.getElementById('modalBackdrop').classList.add('show');
  renderModal();
}
function closeModal(){
  modalOpen = false;
  document.getElementById('modalBackdrop').classList.remove('show');
}
function renderModal(){
  const cs = cycleStatus();
  document.getElementById('mDayNum').textContent = ar(cs.dayNum);
  document.getElementById('mCycleLen').textContent = ar(cs.length);

  const MILESTONES = [15, 30, 45];   // 1-based day numbers that get a distinct marker
  const chain=document.getElementById('beadChain');
  chain.innerHTML='';
  let full=0, tracked=0;
  for(let i=0;i<cs.length;i++){
    const d=addDays(cs.start,i);
    const future=d>cs.today;
    const c=future?-1:dayCompletion(dateKey(d));   // 2=all daily done → filled
    if(!future){ tracked++; if(c===2) full++; }
    const bead=document.createElement('div');
    const isMilestone = MILESTONES.includes(i+1);
    bead.className='bead'
      +(c===2?' full':c===1?' half':'')
      +(dateKey(d)===dateKey(cs.today)?' today':'')
      +(isMilestone?' milestone':'');
    bead.title='اليوم '+ar(i+1)+(isMilestone?' · محطة':'');
    chain.appendChild(bead);
  }

  const cap=document.getElementById('chainCaption');
  if(cap) cap.textContent = `${ar(full)} من ${ar(tracked)} يوم مكتمل`;
}

/* ================= celebratory popup on completion ================= */
/* fixed message + button every time; tapping the button swaps in a quick
   family thank-you note for a moment, then the popup closes on its own. */
const CHEER_MSG = 'مكمليين؟ 😍🚀';
const CHEER_BTN = 'مكمليين 💪🏼💪🏼💪🏼';
const CHEER_THANKS = 'والعائلة معك مكملين 💞💞';
function celebratePop(){
  const back=document.getElementById('cheerBackdrop');
  const msg=document.getElementById('cheerMsg');
  const btn=document.getElementById('cheerBtn');
  if(!back||!msg) return;
  msg.textContent=CHEER_MSG;
  if(btn){ btn.textContent=CHEER_BTN; btn.style.display=''; }
  back.classList.remove('cheer-thanks');
  back.classList.add('show');
}
function confirmCheer(){
  const back=document.getElementById('cheerBackdrop');
  const msg=document.getElementById('cheerMsg');
  const btn=document.getElementById('cheerBtn');
  if(!back||!msg) return;
  msg.textContent=CHEER_THANKS;
  if(btn) btn.style.display='none';
  back.classList.add('cheer-thanks');
  setTimeout(closeCheer, 1400);
}
function closeCheer(){
  const back=document.getElementById('cheerBackdrop');
  if(back) back.classList.remove('show','cheer-thanks');
}

/* ================= edit-mode passcode gate ================= */
function openPasscodeModal(){
  document.getElementById('passcodeBackdrop').classList.add('show');
  document.getElementById('passcodeError').textContent='';
  const input=document.getElementById('passcodeInput');
  input.value='';
  setTimeout(()=>input.focus(), 50);
}
function closePasscodeModal(){
  document.getElementById('passcodeBackdrop').classList.remove('show');
}
function submitPasscode(){
  const input=document.getElementById('passcodeInput');
  if(toLatinDigits(input.value)===EDIT_PASSCODE){   // accept Arabic-Indic digits too
    editMode=true;
    closePasscodeModal();
    render();
  }else{
    document.getElementById('passcodeError').textContent='رمز غير صحيح — حاول مجدداً.';
    input.value='';
    input.focus();
  }
}

/* ================= starfield ================= */
function buildStars(){
  const field=document.getElementById('starField');
  let html='';
  for(let i=0;i<46;i++){
    const size=Math.random()*2+1;
    const top=Math.random()*100;
    const left=Math.random()*100;
    const delay=Math.random()*4;
    html+=`<span class="star" style="width:${size}px;height:${size}px;top:${top}%;left:${left}%;animation-delay:${delay}s;"></span>`;
  }
  field.innerHTML=html;
}

/* ================= boot ================= */
(async function init(){
  buildStars();
  state = await loadState();
  render();
  subscribeRealtime();

  document.getElementById('progressBtn').onclick = openModal;
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalBackdrop').onclick = (ev)=>{
    if(ev.target.id==='modalBackdrop') closeModal();
  };

  document.getElementById('gearBtn').onclick = ()=>{
    if(editMode){ editMode=false; openEditFormId=null; render(); }
    else openPasscodeModal();
  };
  document.getElementById('passcodeClose').onclick = closePasscodeModal;
  document.getElementById('passcodeSubmit').onclick = submitPasscode;
  document.getElementById('passcodeBackdrop').onclick = (ev)=>{
    if(ev.target.id==='passcodeBackdrop') closePasscodeModal();
  };
  document.getElementById('passcodeInput').addEventListener('keydown', (ev)=>{
    if(ev.key==='Enter') submitPasscode();
  });

  document.getElementById('cheerBtn').onclick = confirmCheer;
  document.getElementById('cheerBackdrop').onclick = (ev)=>{
    if(ev.target.id==='cheerBackdrop') closeCheer();
  };

  document.addEventListener('keydown', (ev)=>{
    if(ev.key==='Escape' && modalOpen) closeModal();
    if(ev.key==='Escape' && document.getElementById('passcodeBackdrop').classList.contains('show')) closePasscodeModal();
    if(ev.key==='Escape' && document.getElementById('cheerBackdrop').classList.contains('show')) closeCheer();
  });

  // don't lose a pending debounced save if the tab is hidden or closed
  document.addEventListener('visibilitychange', ()=>{ if(document.hidden && savePending) flushSave(); });
  window.addEventListener('pagehide', ()=>{ if(savePending) flushSave(); });
})();
</script>
